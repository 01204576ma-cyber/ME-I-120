<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#fff;
    font-family:sans-serif;
}

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:9999;
}

.header img{
    display:block;
    width:100%;
    height:auto;
}

.content{
    position:fixed;
    top:250px;          /* ←ここだけ調整 */
    left:0;
    width:100%;
    height:calc(100vh - 160px);
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
}

.content img{
    display:block;
    width:100vw;
    min-width:100vw;
    max-width:100vw;
    height:auto;
}
</style>

</head>

<body>

<div class="header">
    <img src="./top.jpg" alt="">
</div>

<div class="content">
    <img src="./bottom.jpg" alt="">
</div>

</body>
</html>
